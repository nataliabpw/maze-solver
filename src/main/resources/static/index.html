<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Solver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="row mt-4">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card shadow p-4 border-0 mb-4" style="border-radius:12px; height: 90vh;">
                    <div style ="    
                        background: #036033;
                        color: white;
                        text-align: center;
                        margin-bottom: 5px;
                        padding: 12px;
                        box-shadow: 0 3px 6px rgba(0,0,0,0.15);
                    "><h3 style="font-weight: bold;">Maze Solver</h3></div>
                    <div id="errorContainer"
                        class="alert alert-danger"
                        style="display:none; text-align: center;"
                        role="alert">
                    </div>
                    <div id="messageContainer" 
                        class="alert alert-warning" 
                        style="display: none; text-align: center;" 
                        role="alert">
                    </div>
                    <h6 class="mt-3 mb-3" >Upload maze</h6>
                    <input 
                        type="file" 
                        id="mazeFileInput"
                        class="form-control mb-3"
                        accept=".txt"
                    >
                    <button 
                        id="uploadButton"
                        class="btn btn-primary w-100 subButton">
                        Upload file
                    </button>
                    <div id="chooseContainer" style="display:none;">
                        <div id="startInfo" >Start: </div>
                        <button id="chooseStartButton" class="btn btn-primary w-100 subButton">Choose start</button>
                        <div id="endInfo">End: </div>
                        <button id="chooseEndButton"class="btn btn-primary w-100 subButton">Choose end</button>
                    </div>
                    <button id="solveButton" class="btn btn-primary w-100 mt-auto" style="
                        background: #036033;
                        color: white;
                        text-align: center;
                        margin-bottom: 5px;
                        padding: 8px;
                        font-weight: bold;
                    ">Solve</button>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-8">
                <div class="card shadow p-4 border-0 mb-4" style="border-radius:12px; height: 90vh;">
                    <div id="mazeContainer" style="
                        overflow: auto;
                    "><div id="mazeWrapper"><div id="maze"></div></div></div>
                </div>
            </div>
        </div>
    </div>
<script src='/js/app.js' defer></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
